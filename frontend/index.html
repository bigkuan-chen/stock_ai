<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>US Policy Industry Intelligence</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">US Policy Industry Intelligence</p>
        <h1>政策產業與公司機會雷達</h1>
        <p id="analysisStatus" class="meta">待命</p>
      </div>
      <div class="toolbar">
        <label class="field" for="lookbackDaysInput">
          <span>Lookback days</span>
          <input id="lookbackDaysInput" type="number" min="1" step="1" inputmode="numeric" />
        </label>
        <button id="refreshBtn" type="button">重新分析</button>
      </div>
    </header>

    <main>
      <section class="summary-grid" aria-label="summary">
        <div class="metric">
          <span>政策筆數</span>
          <strong id="policyCount">0</strong>
        </div>
        <div class="metric">
          <span>產業數</span>
          <strong id="industryCount">0</strong>
        </div>
        <div class="metric">
          <span>公司數</span>
          <strong id="companyCount">0</strong>
        </div>
        <div class="metric">
          <span>更新日期</span>
          <strong id="updatedAt">-</strong>
        </div>
      </section>

      <section class="layout">
        <div class="panel wide">
          <div class="panel-title">
            <h2>產業排名</h2>
            <span>White House + Federal Register</span>
          </div>
          <div id="industryList" class="stack"></div>
        </div>

        <div class="panel">
          <div class="panel-title">
            <h2>公司排名</h2>
            <span>Policy mentions + yfinance</span>
          </div>
          <div id="companyList" class="stack compact"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>近期政策</h2>
          <span>依資料來源與發布日期排序</span>
        </div>
        <div id="policyList" class="policy-grid"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
